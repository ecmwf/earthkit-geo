version: 2
formats: []
build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    post_checkout:
    - git fetch --unshallow || true
    pre_build:
    - rm -rf _build
    - rm -rf docs/_build
    - cd docs
python:
  install:
  - requirements: docs/requirements.txt
  - method: pip
    path: .
sphinx:
  configuration: docs/conf.py
