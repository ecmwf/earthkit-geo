name: ci

on:
  # Trigger the workflow on push to master or develop, except tag creation
  push:
    branches:
    - "main"
    - "develop"
    tags-ignore:
    - "**"
    paths-ignore:
    - "docs/**"
    - "README.md"

  # Trigger the workflow on pull request
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"

  # Trigger the workflow manually
  workflow_dispatch:

  # Trigger after public PR approved for CI
  pull_request_target:
    types: [labeled]
    paths-ignore:
    - "docs/**"
    - "README.md"

jobs:
  # Run CI including downstream packages on self-hosted runners
  downstream-ci:
    name: downstream-ci
    if: ${{ !github.event.pull_request.head.repo.fork && github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci' }}
    uses: ecmwf/downstream-ci/.github/workflows/downstream-ci.yml@mir-as-shallow-dep-of-ek-regrid
    with:
      earthkit-regrid: ecmwf/earthkit-regrid@${{ github.event.pull_request.head.sha || github.sha }}
      eckit: ecmwf/eckit@feature/eckit-geo
      mir: ecmwf/mir@feature/eckit-geo
      codecov_upload: true
      python_qa: false
    secrets: inherit

  # Build downstream packages on HPC
  downstream-ci-hpc:
    name: downstream-ci-hpc
    if: ${{ !github.event.pull_request.head.repo.fork && github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci' }}
    uses: ecmwf/downstream-ci/.github/workflows/downstream-ci-hpc.yml@mir-as-shallow-dep-of-ek-regrid
    with:
      earthkit-regrid: ecmwf/earthkit-regrid@${{ github.event.pull_request.head.sha || github.sha }}
      eckit: ecmwf/eckit@feature/eckit-geo
      mir: ecmwf/mir@feature/eckit-geo
      skip_matrix_jobs: |
        intel-2021.4.0
        nvidia-22.11
        aocc-4.0.0
        gnu-12.2.0
    secrets: inherit
