build:
  python: 3.10
  dependencies:
  - ecmwf/ecbuild@develop
  - MathisRosenhauer/libaec@refs/tags/v1.1.3
  - ecmwf/eccodes@develop
  - ecmwf/eckit@develop
  - ecmwf/atlas@develop
  - ecmwf/mir@develop
  - ecmwf/odc@develop
  - ecmwf/metkit@develop
  - ecmwf/fdb@develop
  dependency_cmake_options:
  - "ecmwf/eccodes: '-DENABLE_ECKIT_GEO=ON'"
  python_dependencies:
  - ecmwf/eccodes-python@develop
  - ecmwf/earthkit-data@develop
  parallel: 64
  pytest_cmd: |
    EARTHKIT_DATA_CACHE_POLICY=off python -m pytest -n16 || pytest --last-failed --last-failed-no-failures none
  env:
  - ECCODES_SAMPLES_PATH=$ECCODES_DIR/share/eccodes/samples
  - ECCODES_DEFINITION_PATH=$ECCODES_DIR/share/eccodes/definitions
